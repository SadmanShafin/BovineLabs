name: unity-linux-build

on:
  push:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on:
      - self-hosted
      - Linux
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - id: unity-version
        shell: bash
        run: |
          echo "version=$(sed -n 's/^m_EditorVersion: //p' ProjectSettings/ProjectVersion.txt)" >> "$GITHUB_OUTPUT"

      - id: build-name
        shell: bash
        run: |
          ref_name='${{ github.ref_name }}'
          sanitized=$(printf '%s' "$ref_name" | tr '/ ' '-' | tr -cd '[:alnum:]._-')
          if [ -z "$sanitized" ]; then
            sanitized=BovineLabs
          fi
          echo "value=$sanitized" >> "$GITHUB_OUTPUT"

      - id: unity-path
        shell: bash
        run: |
          version='${{ steps.unity-version.outputs.version }}'
          editor_path="$HOME/Unity/Hub/Editor/$version/Editor/Unity"
          if [ ! -x "$editor_path" ]; then
            echo "Missing Unity editor at $editor_path" >&2
            exit 1
          fi
          echo "value=$editor_path" >> "$GITHUB_OUTPUT"

      - name: Build Linux player with local Unity
        shell: bash
        env:
          BUILD_NAME: ${{ steps.build-name.outputs.value }}
        run: |
          rm -rf build/StandaloneLinux64
          '${{ steps.unity-path.outputs.value }}' \
            -batchmode \
            -nographics \
            -quit \
            -projectPath '${{ github.workspace }}' \
            -buildTarget Linux64 \
            -executeMethod Scripts.Editor.BuildAutomation.BuildLinuxWithCurrentProfile \
            -logFile -

      - uses: actions/upload-artifact@v4
        with:
          name: linux-player-${{ steps.build-name.outputs.value }}
          path: build/StandaloneLinux64
          if-no-files-found: error

      - name: Pack Linux build
        shell: bash
        run: |
          python3 - <<'PY'
          import tarfile
          from pathlib import Path
          root = Path('build/StandaloneLinux64')
          build_name = '${{ steps.build-name.outputs.value }}'
          archive = Path(f'{build_name}-linux.tar.gz')
          with tarfile.open(archive, 'w:gz') as tar:
              for rel in [
                  root / f'{build_name}.x86_64',
                  root / 'UnityPlayer.so',
                  root / 'libdecor-0.so.0',
                  root / 'libdecor-cairo.so',
                  root / f'{build_name}_Data',
              ]:
                  tar.add(rel, arcname=rel.name)
          print(archive)
          PY

      - name: Send build to Telegram
        shell: bash
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          caption='${{ github.repository }} • ${{ github.ref_name }} • ${{ github.sha }}'
          curl -fsSL -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TELEGRAM_CHAT_ID}" \
            -F caption="${caption}" \
            -F document=@"${{ steps.build-name.outputs.value }}-linux.tar.gz"
