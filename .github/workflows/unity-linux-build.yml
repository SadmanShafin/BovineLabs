name: unity-linux-build

on:
  push:
    branches:
      - main
      - timeline.targets
      - com.bovinelabs.timeline.*
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-linux:
    runs-on:
      - self-hosted
      - Linux
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true
          submodules: recursive

      - id: unity-version
        shell: bash
        run: |
          echo "version=$(sed -n 's/^m_EditorVersion: //p' ProjectSettings/ProjectVersion.txt)" >> "$GITHUB_OUTPUT"

      - id: build-name
        shell: bash
        run: |
          ref_name='${{ github.ref_name }}'
          sanitized=$(printf '%s' "$ref_name" | tr '/ ' '-' | tr -cd '[:alnum:]._-')
          if [ -z "$sanitized" ]; then
            sanitized=BovineLabs
          fi
          echo "value=$sanitized" >> "$GITHUB_OUTPUT"

      - id: unity-path
        shell: bash
        run: |
          version='${{ steps.unity-version.outputs.version }}'
          editor_path="$HOME/Unity/Hub/Editor/$version/Editor/Unity"
          if [ ! -x "$editor_path" ]; then
            echo "Missing Unity editor at $editor_path" >&2
            exit 1
          fi
          echo "value=$editor_path" >> "$GITHUB_OUTPUT"

      - name: Build Linux player with local Unity
        shell: bash
        env:
          BUILD_NAME: ${{ steps.build-name.outputs.value }}
        run: |
          rm -rf build/StandaloneLinux64
          '${{ steps.unity-path.outputs.value }}' \
            -batchmode \
            -nographics \
            -quit \
            -projectPath '${{ github.workspace }}' \
            -buildTarget Linux64 \
            -executeMethod Scripts.Editor.BuildAutomation.BuildLinuxWithCurrentProfile \
            -logFile -

      - uses: actions/upload-artifact@v4
        with:
          name: linux-player-${{ steps.build-name.outputs.value }}
          path: build/StandaloneLinux64
          if-no-files-found: error
